version: '3.8'

services:
  traefik:
    image: traefik:v3.6
    networks:
      - traefik_proxy
    ports:
      - target: 80
        published: 80
        protocol: tcp
      - target: 8082
        published: 8082
        protocol: tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.metrics.address=:8082"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=traefik_proxy"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
      # Prometheus metrics — kept for autoscaler compatibility
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.manualRouting=true"
      - "--metrics.prometheus.addServicesLabels=true"
      # OTLP metrics — native export to OTel Collector
      - "--metrics.otlp=true"
      - "--metrics.otlp.grpc.endpoint=otel_otel-agent:4317"
      - "--metrics.otlp.grpc.insecure=true"
      - "--metrics.otlp.addServicesLabels=true"
      # OTLP tracing — distributed traces through Traefik
      - "--tracing.otlp=true"
      - "--tracing.otlp.grpc.endpoint=otel_otel-agent:4317"
      - "--tracing.otlp.grpc.insecure=true"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`traefik.myapp.com`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
        - "traefik.http.routers.dashboard.entrypoints=web"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.metrics.rule=Path(`/metrics`)"
        - "traefik.http.routers.metrics.entrypoints=metrics"
        - "traefik.http.routers.metrics.service=prometheus@internal"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"
networks:
  traefik_proxy:
    external: true
