# ELK Stack — Elasticsearch 9.x + Kibana + APM Server (single-node, basic auth, no TLS)
# Deploy: docker stack deploy -c docker/docker-compose-elk.yml elk
#
# Kibana UI:       http://kibana.myapp.com (via Traefik)
# APM waterfall:   http://kibana.myapp.com/app/apm/services
# Elasticsearch:   http://elk_elasticsearch:9200 (internal)
# APM Server OTLP: http://elk_apm-server:8200 (internal, receives traces from OTel Collector)
# Native OTLP:     http://elk_elasticsearch:9200/_otlp (metrics only)
# Default login:   elastic / changeme

version: '3.8'

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    hostname: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=elk-docker
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms768m -Xmx768m
      # Security: basic auth enabled, TLS disabled
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=changeme
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - traefik_proxy
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 768M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.3
    hostname: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=AAEAAWVsYXN0aWMva2liYW5hL2tpYmFuYS10b2tlbjpiaHRObElHV1RtLTlUT0p2eDJPTHhR
      - SERVER_PUBLICBASEURL=http://kibana.myapp.com
    networks:
      - traefik_proxy
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.kibana.rule=Host(`kibana.myapp.com`)"
        - "traefik.http.routers.kibana.entrypoints=web"
        - "traefik.http.services.kibana.loadbalancer.server.port=5601"

  apm-server:
    image: docker.elastic.co/apm/apm-server:9.3.3
    hostname: apm-server
    command: >
      -e
      -E apm-server.host=0.0.0.0:8200
      -E apm-server.rum.enabled=true
      -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E output.elasticsearch.username=elastic
      -E output.elasticsearch.password=changeme
    networks:
      - traefik_proxy
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

networks:
  traefik_proxy:
    external: true

volumes:
  es_data:
