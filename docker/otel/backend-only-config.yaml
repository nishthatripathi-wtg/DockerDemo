# OTel Collector — Dev configuration
# Receives OTLP from backend Java Agent + Traefik,
# scrapes Traefik Prometheus metrics,
# exports traces, metrics, and logs to Splunk HEC + debug stdout.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: traefik
          scrape_interval: 30s
          static_configs:
            - targets: ["traefik_traefik:8082"]

  postgresql:
    endpoint: myapp_db:5432
    username: monitor
    password: monitor
    databases:
      - myuser
    collection_interval: 60s
    tls:
      insecure: true

processors:
  resourcedetection:
    detectors: [system, env]
    system:
      hostname_sources: [os]
    timeout: 5s
    override: false

  batch:
    timeout: 2s
    send_batch_size: 500
    send_batch_max_size: 1000

exporters:
  debug:
    verbosity: basic

  splunk_hec:
    token: "otel-hec-token"
    endpoint: "http://splunk_splunk:8088"
    source: "otel"
    sourcetype: "otel"
    sending_queue:
      enabled: true
      num_consumers: 5
      queue_size: 5000
    timeout: 10s
    index: "main"
    log_data_enabled: true
    tls:
      insecure_skip_verify: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [debug, splunk_hec]
    metrics:
      receivers: [otlp, prometheus, postgresql]
      processors: [resourcedetection, batch]
      exporters: [debug, splunk_hec]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [debug, splunk_hec]

  telemetry:
    logs:
      level: info
