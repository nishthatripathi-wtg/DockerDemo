# OTel Collector — Dev configuration (LGTM backend)
# Receives OTLP from backend Java Agent,
# scrapes Traefik Prometheus metrics + PostgreSQL,
# exports to: Prometheus (metrics), Tempo (traces), Loki (logs), Splunk HEC (all), debug.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: traefik
          scrape_interval: 30s
          static_configs:
            - targets: ["traefik_traefik:8082"]

  postgresql:
    endpoint: myapp_db:5432
    username: monitor
    password: monitor
    databases:
      - myuser
    collection_interval: 60s
    tls:
      insecure: true

processors:
  resourcedetection:
    detectors: [system, env]
    system:
      hostname_sources: [os]
    timeout: 5s
    override: false

  # Copy url.path → http.route on Traefik spans so Tempo spanmetrics
  # can break down latency per route for the Traefik layer.
  transform:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["http.route"], attributes["url.path"]) where resource.attributes["service.name"] == "traefik" and attributes["url.path"] != nil and attributes["http.route"] == nil

  batch:
    timeout: 2s
    send_batch_size: 500
    send_batch_max_size: 1000

exporters:
  debug:
    verbosity: basic

  splunk_hec:
    token: "otel-hec-token"
    endpoint: "http://splunk_splunk:8088"
    source: "otel"
    sourcetype: "otel"
    sending_queue:
      enabled: true
      num_consumers: 5
      queue_size: 5000
    timeout: 10s
    index: "main"
    log_data_enabled: true
    tls:
      insecure_skip_verify: true

  # Prometheus exporter — Prometheus scrapes this endpoint
  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true

  # Tempo — receives traces via OTLP gRPC
  otlp/tempo:
    endpoint: "monitoring_tempo:4317"
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

  # Loki — receives logs via OTLP HTTP
  otlphttp/loki:
    endpoint: "http://monitoring_loki:3100/otlp"
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, transform, batch]
      exporters: [debug, splunk_hec, otlp/tempo]
    metrics:
      receivers: [otlp, prometheus, postgresql]
      processors: [resourcedetection, batch]
      exporters: [debug, splunk_hec, prometheus]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [debug, splunk_hec, otlphttp/loki]

  telemetry:
    logs:
      level: info
