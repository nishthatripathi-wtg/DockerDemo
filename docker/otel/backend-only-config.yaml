# OTel Collector — Dev configuration (Elasticsearch 9.x + APM Server + Splunk + LGTM)
# Receives OTLP from backend Java Agent,
# scrapes Traefik Prometheus metrics + PostgreSQL,
# exports to:
#   Traces  → APM Server via OTLP (for Kibana APM waterfall)
#   Traces  → Tempo via OTLP (for Grafana trace waterfall)
#   Metrics → Elasticsearch native OTLP endpoint (/_otlp/v1/metrics)
#   Metrics → Prometheus exporter :8889 (spanmetrics for Grafana RED)
#   Logs    → Elasticsearch bulk API (elasticsearch exporter)
#   All     → Splunk HEC (traces, metrics, logs)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: traefik
          scrape_interval: 30s
          static_configs:
            - targets: ["traefik_traefik:8082"]

  postgresql:
    endpoint: myapp_db:5432
    username: monitor
    password: monitor
    databases:
      - myuser
    collection_interval: 60s
    tls:
      insecure: true

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [2ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.route
      - name: http.request.method
      - name: http.response.status_code
    dimensions_cache_size: 1000
    aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
    metrics_flush_interval: 15s
    namespace: traces_spanmetrics

processors:
  resourcedetection:
    detectors: [system, env]
    system:
      hostname_sources: [os]
    timeout: 5s
    override: false

  transform:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["http.route"], attributes["url.path"]) where resource.attributes["service.name"] == "traefik" and attributes["url.path"] != nil and attributes["http.route"] == nil

  batch:
    timeout: 2s
    send_batch_size: 500
    send_batch_max_size: 1000

exporters:
  debug:
    verbosity: basic

  # Tempo — traces via OTLP gRPC (for Grafana trace waterfall + TraceQL)
  otlp/tempo:
    endpoint: "monitoring_tempo:4317"
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

  # Prometheus exporter — exposes spanmetrics on :8889 for Prometheus to scrape
  prometheus/spanmetrics:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true

  # APM Server — traces via OTLP gRPC (writes to traces-apm-* for Kibana waterfall)
  otlp/apm:
    endpoint: "elk_apm-server:8200"
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

  # Elasticsearch native OTLP — metrics only (/_otlp/v1/metrics)
  otlphttp/es:
    endpoint: "http://elk_elasticsearch:9200/_otlp"
    headers:
      Authorization: "Basic ZWxhc3RpYzpjaGFuZ2VtZQ=="
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

  # Splunk HEC — all signals (traces, metrics, logs)
  splunk_hec:
    token: "otel-hec-token"
    endpoint: "http://splunk_splunk:8088"
    source: "otel"
    sourcetype: "otel"
    index: "main"
    tls:
      insecure_skip_verify: true
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

  # Elasticsearch bulk API — logs (writes to logs-generic.otel-*)
  elasticsearch:
    endpoints: ["http://elk_elasticsearch:9200"]
    user: elastic
    password: changeme
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

  # Loki — logs via OTLP HTTP (Loki 3.x native OTLP ingestion)
  otlphttp/loki:
    endpoint: "http://monitoring_loki:3100/otlp"
    sending_queue:
      enabled: true
      num_consumers: 3
      queue_size: 2000

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, transform, batch]
      exporters: [debug, otlp/apm, otlp/tempo, splunk_hec, spanmetrics]
    metrics:
      receivers: [otlp, prometheus, postgresql]
      processors: [resourcedetection, batch]
      exporters: [debug, otlphttp/es, splunk_hec]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      exporters: [prometheus/spanmetrics]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [debug, elasticsearch, splunk_hec, otlphttp/loki]

  telemetry:
    logs:
      level: info
