version: '3.8'

services:

  frontend:
    image: registry.myapp.com/dockerdemoweb
    networks:
      - traefik_proxy
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=Host(`myapp.local`)"
        - "traefik.http.routers.frontend.entrypoints=web"
        - "traefik.http.routers.frontend.priority=1"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"
        - "autoscaler.enabled=true"
        - "autoscaler.target_rps_per_replica=5"
        - "autoscaler.max_replicas=10"
        - "autoscaler.min_replicas=3"
        - "autoscaler.metric_service=frontend@swarm"

  backend:
    image: registry.myapp.com/dockerdemo
    networks:
      - traefik_proxy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/myuser
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      OTEL_SERVICE_NAME: demo-backend
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=myapp,deployment.environment=production,host.name=demo-backend"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-agent:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
    deploy:
      replicas: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=Host(`myapp.local`) && PathPrefix(`/api`)"
        - "traefik.http.routers.backend.entrypoints=web"
        - "traefik.http.routers.backend.priority=10"
        - "traefik.http.services.backend.loadbalancer.server.port=8080"
        - "autoscaler.enabled=true"
        - "autoscaler.target_rps_per_replica=5"
        - "autoscaler.max_replicas=10"
        - "autoscaler.min_replicas=3"
        - "autoscaler.metric_service=backend@swarm"


  db:
    image: postgres:17
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "log_min_duration_statement=200"
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/init-monitoring.sql
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik_proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  autoscaler:
    image: registry.myapp.com/autoscaler
    networks:
      - traefik_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      #force unbuffered Python logs in Docker.
      PYTHONUNBUFFERED: "1"
      TRAEFIK_METRICS_URL: http://traefik_traefik:8082/metrics
      POLL_SECONDS: "30"
      DRY_RUN: "false"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

networks:
  traefik_proxy:
    external: true

volumes:
  postgres_data:

configs:
  postgres_init:
    file: ./postgres-init.sql
