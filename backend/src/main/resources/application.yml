server:
  port: 8080

spring:
  application:
    name: demo-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/myuser
    username: myuser
    password: mypassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

translation:
  provider:
    url: https://translate.argosopentech.com/translate
    api-key: ""
    timeout-ms: 5000

activemq:
  broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}

camel:
  springboot:
    name: demo-backend-camel
