server:
  port: 8080

spring:
  application:
    name: demo-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/myuser
    username: myuser
    password: mypassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

translation:
  provider:
    url: https://translate.argosopentech.com/translate
    api-key: ""
    timeout-ms: 5000

translator:
  service:
    url: ${TRANSLATOR_SERVICE_URL:http://localhost:8081}

activemq:
  broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  metrics:
    distribution:
      percentiles-histogram:
        camel.exchange.processing.time: true

camel:
  springboot:
    name: demo-backend-camel
  opentelemetry:
    enabled: true
