# P6Spy Configuration
# Intercepts all JDBC calls and logs full SQL with bind values and execution time.

# --- Appender: write to a dedicated log file ---
appender=com.p6spy.engine.spy.appender.FileLogger
logfile=p6spy.log

# --- Log format ---
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=%(currentTime)|%(executionTime)ms|%(category)|connection%(connectionId)|%(sqlSingleLine)

# --- Include bind parameter values in the logged SQL ---
excludecategories=info,debug,result,resultset,batch

# --- Do not truncate SQL ---
logMessageFormatMaxLength=0

# --- Date format for %(currentTime) ---
databaseDialectDateFormat=yyyy-MM-dd HH:mm:ss.SSS

# --- Stack trace (disabled for performance; enable to trace call origin) ---
stacktrace=false
