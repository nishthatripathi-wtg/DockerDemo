version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "1BoleroConnectionModule$$"
    ports:
      - "1433:1433"
    volumes:
      - /docker/volumes/sqlserver2019/data:/var/opt/mssql
    networks:
      - traefik_proxy
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

networks:
  traefik_proxy:
    external: true
